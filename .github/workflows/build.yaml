name: Build & Push

on:
  push:
    branches:
      - main
    tags:
      - v*

jobs:
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    permissions:
      artifact-metadata: write
      attestations: write
      contents: read
      id-token: write
      packages: write
    steps:
      - name: Build & Push
        uses: den4200/shared-workflows/actions/build-container-image@527dd471809f1c741a5472b0468fee786ab6f616
