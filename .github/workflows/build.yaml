name: Build & Push

on:
  push:
    branches:
      - main
    tags:
      - v*

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      artifact-metadata: write
      attestations: write
      contents: read
      id-token: write
      packages: write
    steps:
      - uses: den4200/shared-workflows/actions/build-container-image@c98afb38abede2da1bdc8fa8aaedc9310c35069e
        with:
          image: ${{ github.actor }}/dennispham-me
